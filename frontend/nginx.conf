server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /upload {
        proxy_pass http://backend:8080/upload;
        client_max_body_size 100M;
    }

    location /download {
        proxy_pass http://backend:8080/download;
    }

    location /view {
        proxy_pass http://backend:8080/view;
    }

    location /file {
        proxy_pass http://backend:8080/file;
    }
}
